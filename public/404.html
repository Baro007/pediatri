<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PediaSemio - Yönlendiriliyor...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">P</div>
        <h1>PediaSemio</h1>
        <div class="spinner"></div>
        <p class="message">Yönlendiriliyor...</p>
    </div>

    <script>
        // GitHub Pages SPA routing support
        // This script redirects 404 errors to the root with the path as a parameter
        (function() {
            // Get the current path
            const path = window.location.pathname;
            const basePath = '/pediatri';
            
            // If we're on GitHub Pages and the path doesn't start with the base path
            if (window.location.hostname === 'baro007.github.io' && !path.startsWith(basePath)) {
                // Redirect to the base path with the current path as a parameter
                window.location.replace(window.location.origin + basePath + '?redirect=' + encodeURIComponent(path));
            } else {
                // Extract the path after the base path
                const redirectPath = path.replace(basePath, '') || '/';
                
                // Redirect to the root with the path as a parameter
                window.location.replace(window.location.origin + basePath + '?redirect=' + encodeURIComponent(redirectPath));
            }
        })();
    </script>
</body>
</html>
